services:
  pi:
    image: nginx:alpine
    container_name: pi
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # Original domain via Cloudflare DNS challenge
      - "traefik.http.routers.pi.rule=Host(`pi.redcats.uk`)"
      - "traefik.http.routers.pi.entrypoints=websecure"
      - "traefik.http.routers.pi.tls.certresolver=letsencrypt"
      # personality.engineering apex via HTTP-01 challenge
      - "traefik.http.routers.pi-pe.rule=Host(`personality.engineering`)"
      - "traefik.http.routers.pi-pe.entrypoints=websecure"
      - "traefik.http.routers.pi-pe.tls.certresolver=le-http"
      # www → apex redirect
      - "traefik.http.routers.pi-pe-www.rule=Host(`www.personality.engineering`)"
      - "traefik.http.routers.pi-pe-www.entrypoints=websecure"
      - "traefik.http.routers.pi-pe-www.tls.certresolver=le-http"
      - "traefik.http.routers.pi-pe-www.middlewares=redirect-to-apex"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.regex=^https://www\\.personality\\.engineering/(.*)"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.replacement=https://personality.engineering/$${1}"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.permanent=true"
      - "traefik.http.services.pi.loadbalancer.server.port=80"
networks:
  web:
    external: true
