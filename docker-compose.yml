services:
  pi:
    image: nginx:alpine
    container_name: pi
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pi.rule=Host(`pi.redcats.uk`) || Host(`personality.engineering`)"
      - "traefik.http.routers.pi-www.rule=Host(`www.personality.engineering`)"
      - "traefik.http.routers.pi-www.entrypoints=websecure"
      - "traefik.http.routers.pi-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pi-www.middlewares=redirect-to-apex"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.regex=^https://www\\.personality\\.engineering/(.*)"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.replacement=https://personality.engineering/$${1}"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.permanent=true"
      - "traefik.http.routers.pi.entrypoints=websecure"
      - "traefik.http.routers.pi.tls.certresolver=letsencrypt"
      - "traefik.http.services.pi.loadbalancer.server.port=80"
networks:
  web:
    external: true
