name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/key root@${{ secrets.SERVER_HOST }} '
            cd /opt/sites/pi &&
            git fetch origin &&
            git checkout -f origin/main -- . &&
            echo "Deployed at $(date)"
          '
          rm -f ~/.ssh/key
